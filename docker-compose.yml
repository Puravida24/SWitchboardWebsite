services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: switchboard_web
      POSTGRES_USER: switchboard
      POSTGRES_PASSWORD: switchboard_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"

volumes:
  pgdata:
