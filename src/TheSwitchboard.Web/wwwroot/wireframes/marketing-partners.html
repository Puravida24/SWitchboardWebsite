<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Partners — The Switchboard</title>
<meta name="description" content="">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#1c1917">
<link rel="canonical" href="https://www.theswitchboardmarketing.com/marketing-partners">
<link rel="icon" type="image/png" href="/wireframes/assets/logo/switchboard-logo.png">
<link rel="apple-touch-icon" href="/wireframes/assets/logo/switchboard-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream-1: #faf9f7;
  --cream-2: #f5f0eb;
  --cream-3: #efe8e0;
  --charcoal-1: #1c1917;
  --charcoal-2: #211f1c;
  --charcoal-3: #292524;
  --gold: #003399;
  --gold-glow: rgba(0, 51, 153, 0.35);
  --warm-gray: #78716c;
  --warm-gray-light: #a8a29e;
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: var(--sans);
  color: var(--charcoal-1);
  background: var(--cream-1);
  line-height: 1.75;
  font-weight: 300;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  opacity: 0.5;
}

h1, h2, h3 { font-family: var(--serif); font-weight: 400; line-height: 1.15; letter-spacing: -0.015em; }

.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 0 2rem;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(180deg, rgba(250,249,247,0.92) 0%, rgba(245,240,235,0.88) 100%);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid rgba(0, 51, 153,0.15);
  box-shadow: 0 1px 3px rgba(28,25,23,0.04), 0 4px 12px rgba(28,25,23,0.03);
}

.logo { display: flex; align-items: center; text-decoration: none; line-height: 0; }
.logo-img { height: 38px; width: auto; display: block; }

.back-link {
  font-family: var(--sans);
  font-size: 0.82rem;
  color: var(--charcoal-3);
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: color 0.3s;
}

.back-link:hover { color: var(--gold); }

.legal-hero {
  padding: 140px 2rem 60px;
  background: linear-gradient(180deg, var(--cream-1) 0%, var(--cream-2) 100%);
  text-align: center;
}

.legal-overline {
  font-family: var(--sans);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.25rem;
}

.breadcrumb {
  font-family: var(--sans);
  font-size: 0.75rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--warm-gray);
  margin-bottom: 1.5rem;
}
.breadcrumb a {
  color: var(--charcoal-3);
  text-decoration: none;
  transition: color 0.3s;
}
.breadcrumb a:hover { color: var(--gold); }
.breadcrumb [aria-current="page"] { color: var(--charcoal-1); font-weight: 500; }
.breadcrumb .sep { margin: 0 0.55rem; color: var(--warm-gray-light); }

.legal-hero h1 {
  font-size: clamp(2.4rem, 5vw, 3.75rem);
  color: var(--charcoal-1);
  margin-bottom: 1rem;
}

.legal-meta {
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--warm-gray);
}

.legal-body {
  max-width: 1100px;
  margin: 0 auto;
  padding: 60px 2rem 120px;
}

.legal-body p.intro {
  font-size: 1.05rem;
  color: var(--charcoal-3);
  margin-bottom: 2rem;
  line-height: 1.8;
  max-width: 760px;
}

.legal-body p.intro a {
  color: var(--charcoal-1);
  text-decoration: underline;
  text-decoration-color: var(--gold);
  text-underline-offset: 3px;
}

.partners-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 1.25rem 0 1rem;
  border-top: 1px solid rgba(0, 51, 153,0.2);
  border-bottom: 1px solid rgba(0, 51, 153,0.08);
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  gap: 0.75rem;
}

.partners-toolbar .count {
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--warm-gray);
}

.partners-toolbar .updated {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--warm-gray);
}

.partners-intro {
  font-size: 0.95rem;
  color: var(--charcoal-3);
  margin-bottom: 1.5rem;
  font-weight: 400;
}

.partners-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 0.25rem 2rem;
  column-rule: 1px solid rgba(0, 51, 153,0.06);
}

.partner-item {
  padding: 0.45rem 0;
  font-size: 0.88rem;
  color: var(--charcoal-3);
  border-bottom: 1px solid rgba(120,113,108,0.12);
  line-height: 1.4;
  word-wrap: break-word;
}
.partner-item a {
  color: var(--gold);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 2px;
  transition: color 0.3s;
}
.partner-item a:hover { color: var(--charcoal-1); }

.empty-state {
  padding: 3rem 0;
  text-align: center;
  color: var(--warm-gray);
  font-style: italic;
}

.site-footer {
  background: var(--charcoal-1);
  border-top: 1px solid rgba(0, 51, 153,0.1);
  padding: 48px 2rem 32px;
}

.footer-inner {
  max-width: 1080px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1.5rem;
}

.footer-inner .logo { font-size: 1.1rem; color: var(--cream-2); }
.footer-logo { display: flex; align-items: center; text-decoration: none; line-height: 0; }
.footer-logo-img { height: 36px; width: auto; display: block; filter: brightness(0) invert(1); opacity: 0.92; }

.footer-links { display: flex; gap: 1.75rem; flex-wrap: wrap; }

.footer-links a {
  font-size: 0.8rem;
  color: var(--warm-gray-light);
  text-decoration: none;
  font-weight: 300;
  transition: color 0.3s;
}

.footer-links a:hover { color: var(--gold); }

.footer-bottom {
  max-width: 1080px;
  margin: 2rem auto 0;
  padding-top: 1.5rem;
  border-top: 1px solid rgba(0, 51, 153,0.08);
  font-size: 0.72rem;
  color: var(--warm-gray);
  font-weight: 300;
}

@media (max-width: 640px) {
  .legal-body { padding: 40px 1.5rem 80px; }
  .partners-grid { grid-template-columns: 1fr 1fr; gap: 0 1rem; }
  .footer-inner { flex-direction: column; align-items: flex-start; }
  .logo-img { height: 32px; }
  .footer-logo-img { height: 30px; }
}
</style>
</head>
<body>

<header class="site-header">
  <a href="/" class="logo" aria-label="The Switchboard"><img class="logo-img" src="/wireframes/assets/logo/switchboard-logo.png" alt="The Switchboard"/></a>
</header>

<section class="legal-hero">
  <nav class="breadcrumb" aria-label="Breadcrumb">
    <a href="/">Home</a><span class="sep" aria-hidden="true">›</span><span aria-current="page">Marketing Partners</span>
  </nav>
  <h1>Marketing Partners</h1>
  <p class="legal-meta">Last updated {{LAST_UPDATED}}</p>
</section>

<main class="legal-body">
  <p class="partners-intro">Carriers and partner companies include</p>
  {{PARTNERS_GRID}}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <a href="/" class="footer-logo" aria-label="The Switchboard"><img class="footer-logo-img" src="/wireframes/assets/logo/switchboard-logo.png" alt="The Switchboard"/></a>
    <div class="footer-links">
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
    </div>
  </div>
  <div class="footer-bottom">
    &copy; 2026 The Switchboard, LLC. All rights reserved.
  </div>
</footer>

</body>
</html>
